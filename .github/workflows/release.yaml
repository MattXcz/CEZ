name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname --merged "${current_tag}^{}" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${current_tag}$" \
            | head -n 1 || true)"

          {
            echo "## Změny"
            echo
            if [[ -n "${previous_tag}" ]]; then
              git log --pretty='- %s (%h)' "${previous_tag}..${current_tag}"
            else
              git log --pretty='- %s (%h)' "${current_tag}"
            fi
          } > release-notes.md

      # Only create GitHub Release for:
      # - stable tags: vX.Y.Z
      # - rc tags: vX.Y.ZrcN (as prerelease)
      - name: Create GitHub Release
        if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, 'dev') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') }}
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          generate_release_notes: false
