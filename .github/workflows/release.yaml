name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes (Release Drafter)
        id: rd
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release.yaml
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only create GitHub Release for:
      # - stable tags: vX.Y.Z
      # - rc tags: vX.Y.ZrcN (as prerelease)
      - name: Create GitHub Release
        if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, 'dev') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') }}
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.rd.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          generate_release_notes: false
