name: 🔍 Code Quality

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install uv
              uses: astral-sh/setup-uv@v5
            - name: Run pre-commit (if configured)
              run: |
                  if [ -f .pre-commit-config.yaml ]; then
                    uv tool run pre-commit run --all-files --show-diff-on-failure
                  else
                    echo "ℹ️ .pre-commit-config.yaml not found, skipping pre-commit checks"
                  fi

    validate-integrations:
        runs-on: ubuntu-latest
        needs: pre-commit
        steps:
            - uses: actions/checkout@v4
            - name: Check integration structure
              run: |
                  # Verify required files exist
                  test -f custom_components/cez/__init__.py
                  test -f custom_components/cez/manifest.json
                  test -f hacs.json
                  test -f README.md
                  echo "✅ All required files present"

                  # Verify no Python syntax errors
                  python -m py_compile custom_components/cez/*.py
                  echo "✅ Python syntax validation passed"
